name: Navigation Diagnostic

on:
  push:
    branches:
      - agent/navbar-mobile-navigation
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/navbar-mobile-navigation
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Capture lint and typecheck output
        run: |
          mkdir -p navigation-diagnostic
          npm run lint > navigation-diagnostic/lint.log 2>&1 || true
          npm run typecheck > navigation-diagnostic/typecheck.log 2>&1 || true
      - name: Upload diagnostic logs
        uses: actions/upload-artifact@v6
        with:
          name: navigation-diagnostic
          path: navigation-diagnostic
          retention-days: 2
