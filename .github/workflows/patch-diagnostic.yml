name: Patch Diagnostic

on:
  push:
    branches:
      - agent/dire-war-table-homepage
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/dire-war-table-homepage
      - name: Check patch
        run: |
          mkdir -p patch-diagnostic
          sed '/^index /d' .github/homepage-polish.patch > /tmp/homepage-polish.patch
          set +e
          patch --dry-run --batch --forward -p1 < /tmp/homepage-polish.patch > patch-diagnostic/result.txt 2>&1
          echo $? > patch-diagnostic/status.txt
          set -e
          cat patch-diagnostic/result.txt
      - name: Upload diagnostic
        uses: actions/upload-artifact@v6
        with:
          name: homepage-polish-patch-diagnostic
          path: patch-diagnostic
          retention-days: 2
