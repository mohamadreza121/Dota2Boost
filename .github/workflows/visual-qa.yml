name: Visual QA

on:
  push:
    branches:
      - agent/dire-war-table-homepage
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  browser-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: agent/dire-war-table-homepage

      - name: Apply browser-confirmed polish
        run: |
          if [ ! -f scripts/apply-homepage-polish.py ]; then
            echo "No pending polish transform."
            exit 0
          fi
          python scripts/apply-homepage-polish.py
          rm scripts/apply-homepage-polish.py .github/homepage-polish.patch
          git config user.name "highground-qa[bot]"
          git config user.email "highground-qa[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Polish homepage after browser QA"
          git push origin HEAD:agent/dire-war-table-homepage

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install temporary browser QA tooling
        run: npm install --no-save --package-lock=false playwright@1.54.2 @axe-core/playwright@4.10.2 lighthouse@12.8.1

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build production application
        run: npm run build

      - name: Start production server
        run: |
          npm run start -- -p 3000 > /tmp/highground-next.log 2>&1 &
          echo $! > /tmp/highground-next.pid
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:3000 > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/highground-next.log
          exit 1

      - name: Run Chromium visual and accessibility QA
        run: node scripts/visual-qa.mjs

      - name: Capture revealed homepage chapters
        run: node scripts/visual-section-qa.mjs

      - name: Run Lighthouse mobile
        continue-on-error: true
        run: |
          CHROME_PATH=$(find "$HOME/.cache/ms-playwright" -type f -name chrome | head -n 1)
          npx lighthouse http://127.0.0.1:3000 \
            --chrome-path="$CHROME_PATH" \
            --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json \
            --output-path=qa-artifacts/lighthouse-mobile.json \
            --quiet

      - name: Run Lighthouse desktop
        continue-on-error: true
        run: |
          CHROME_PATH=$(find "$HOME/.cache/ms-playwright" -type f -name chrome | head -n 1)
          npx lighthouse http://127.0.0.1:3000 \
            --chrome-path="$CHROME_PATH" \
            --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
            --preset=desktop \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json \
            --output-path=qa-artifacts/lighthouse-desktop.json \
            --quiet

      - name: Upload visual QA evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dire-war-table-visual-qa
          path: |
            qa-artifacts
            /tmp/highground-next.log
          if-no-files-found: warn
          retention-days: 14
