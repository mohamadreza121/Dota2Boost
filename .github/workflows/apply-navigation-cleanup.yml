name: Apply Navigation Cleanup

on:
  push:
    branches:
      - agent/navbar-mobile-navigation
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/navbar-mobile-navigation
      - name: Remove retired navigation CSS
        run: |
          python scripts/cleanup-navigation-css.py
          rm scripts/cleanup-navigation-css.py .github/workflows/apply-navigation-cleanup.yml
          git config user.name "highground-cleanup[bot]"
          git config user.email "highground-cleanup[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove retired Dire Forge navigation CSS"
          git push origin HEAD:agent/navbar-mobile-navigation
